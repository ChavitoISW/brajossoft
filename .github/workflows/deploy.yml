name: 🚀 Pipeline CI/CD Completo

on:
  push:
    branches: [ main, dev, testqa ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # FASE 1: Build y Test (ejecutan en paralelo)
  build:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
    
    - name: 🟢 Configurar Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: 📦 Instalar dependencias
      run: npm install
    
    - name: 🔍 Lint código
      run: npm run lint || echo "⚠️ Lint completado con warnings"
    
    - name: 🏗️ Build Next.js
      run: npm run build
      env:
        NODE_ENV: production
        NEXT_TELEMETRY_DISABLED: 1
    
    - name: ✅ Build exitoso
      run: echo "✅ Build completado correctamente"

  quality:
    name: 📊 Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
    
    - name: 🟢 Configurar Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: 📦 Instalar dependencias
      run: npm install
    
    - name: 🔍 ESLint Check
      run: npm run lint || echo "⚠️ Lint warnings encontrados"
    
    - name: 📊 Análisis de código
      run: |
        echo "📊 Análisis de código completado"
        echo "Total de archivos JavaScript/JSX:"
        find . -name "*.js" -o -name "*.jsx" | grep -v node_modules | wc -l
        echo "Componentes:"
        ls -la components/ || echo "Sin componentes"
    
    - name: ✅ Quality checks pasados
      run: echo "✅ Todos los checks de calidad pasaron correctamente"

  # FASE 2: Build de imagen (requiere que pasen build y quality)
  docker-build:
    name: 🐳 Build & Push Imagen
    runs-on: ubuntu-latest
    needs: [build, quality]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
    
    - name: 🔤 Convertir nombre de repositorio a minúsculas
      id: lowercase
      run: |
        echo "image_name=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
    
    - name: 🐳 Instalar Podman
      run: |
        sudo apt-get update
        sudo apt-get -y install podman
        podman --version
    
    - name: 🔐 Login a GitHub Container Registry
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | podman login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
    
    - name: 📝 Generar tags
      id: tags
      run: |
        IMAGE=${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}
        TAGS="${IMAGE}:${GITHUB_SHA::8}"
        if [[ $GITHUB_REF == refs/heads/main ]]; then
          TAGS="${TAGS},${IMAGE}:latest"
        fi
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
          TAGS="${TAGS},${IMAGE}:${VERSION}"
        fi
        echo "tags=${TAGS}" >> $GITHUB_OUTPUT
        echo "Tags generados: ${TAGS}"
    
    - name: 🏗️ Build imagen con Podman
      run: |
        podman build \
          -t ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}:${GITHUB_SHA::8} \
          -f ./Dockerfile \
          .
    
    - name: 📤 Push imagen a Registry
      run: |
        IFS=',' read -ra TAGS <<< "${{ steps.tags.outputs.tags }}"
        for tag in "${TAGS[@]}"; do
          echo "Pushing ${tag}..."
          podman tag ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}:${GITHUB_SHA::8} ${tag}
          podman push ${tag}
        done
    
    - name: ✅ Imagen Podman lista
      run: echo "✅ Imagen construida y publicada en ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}"

  # FASE 3: Deploy (requiere que pase docker-build, solo en main)
  deploy:
    name: 🚀 Deploy a Producción
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
    
    - name: 🚀 Deploy a servidor con Podman
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          set -e
          
          # Asegurar que podman-compose esté en el PATH
          export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"
          
          # Cargar bashrc si existe
          [ -f ~/.bashrc ] && source ~/.bashrc
          
          # Directorio de deployment
          DEPLOY_DIR="/var/www/brajossoft"
          
          echo "📂 Navegando a $DEPLOY_DIR..."
          cd "$DEPLOY_DIR"
          
          # Verificar que es un repositorio git
          if [ -d ".git" ]; then
            echo "📥 Actualizando código desde GitHub..."
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
          else
            echo "❌ No es un repositorio git válido"
            exit 1
          fi
          
          # Detener contenedores actuales
          echo "🛑 Deteniendo contenedores..."
          
          # Buscar podman-compose
          COMPOSE_CMD=""
          if command -v podman-compose &> /dev/null; then
            COMPOSE_CMD="podman-compose"
          elif command -v pipx &> /dev/null; then
            COMPOSE_CMD="pipx run podman-compose"
          elif [ -f "$HOME/.local/bin/podman-compose" ]; then
            COMPOSE_CMD="$HOME/.local/bin/podman-compose"
          else
            echo "❌ podman-compose no encontrado"
            exit 1
          fi
          
          echo "🔧 Usando: $COMPOSE_CMD"
          
          # Detener SOLO contenedores del proyecto brajossoft (no afecta otros)
          echo "🛑 Deteniendo contenedores de BraJos Soft..."
          
          # Buscar contenedores del proyecto por nombre
          BRAJOS_CONTAINERS=$(podman ps -a --filter "name=brajos-soft" --format '{{.Names}}' 2>/dev/null || true)
          
          if [ -n "$BRAJOS_CONTAINERS" ]; then
            echo "Contenedores encontrados: $BRAJOS_CONTAINERS"
            for container in $BRAJOS_CONTAINERS; do
              echo "  Deteniendo: $container"
              podman stop "$container" 2>/dev/null || true
              echo "  Eliminando: $container"
              podman rm "$container" 2>/dev/null || true
            done
          else
            echo "No se encontraron contenedores previos de BraJos Soft"
          fi
          
          # Limpiar imagen anterior del proyecto (opcional)
          podman rmi brajossoft:latest 2>/dev/null || true
          
          # Rebuild imagen con Podman
          echo "🏗️ Construyendo imagen de BraJos Soft..."
          podman build -t brajossoft:latest -f Dockerfile .
          
          # Iniciar contenedores
          echo "🚀 Iniciando contenedores de BraJos Soft..."
          $COMPOSE_CMD up -d
          
          # Obtener ID del nuevo contenedor
          NEW_CONTAINER=$(podman ps -q --filter "name=brajos-soft" | head -n1)
          
          if [ -z "$NEW_CONTAINER" ]; then
            echo "❌ No se pudo iniciar el contenedor"
            exit 1
          fi
          
          echo "✅ Contenedor iniciado: $NEW_CONTAINER"
          
          # Esperar a que el contenedor esté listo
          echo "⏳ Esperando a que el servicio esté listo..."
          sleep 10
          
          # Verificar que el sitio responde
          echo "🔍 Verificando que el sitio responde en puerto 3001..."
          if curl -f http://localhost:3001 > /dev/null 2>&1; then
            echo "✅ Sitio web respondiendo correctamente"
          else
            echo "❌ El sitio no responde en puerto 3001"
            echo "Logs del contenedor de BraJos Soft:"
            podman logs $(podman ps -q --filter "name=brajos-soft" | head -n1) || true
            exit 1
          fi
          
          # Verificar estado de contenedores
          echo "📊 Estado de contenedores de BraJos Soft:"
          podman ps --filter "name=brajos-soft"
          
          echo ""
          echo "🎉 Deployment completado exitosamente"
          echo "🌐 Sitio web disponible en puerto 3001"
          echo ""
          echo "ℹ️  Otros contenedores del servidor no fueron afectados"
    
    - name: ✅ Deployment exitoso
      run: echo "✅ BraJos Soft desplegado correctamente en producción"
    
    - name: 🔔 Notificación de éxito
      if: success()
      run: |
        echo "🎉 Deployment exitoso"
        echo "📦 Commit: ${{ github.sha }}"
        echo "👤 Autor: ${{ github.actor }}"
        echo "📝 Mensaje: ${{ github.event.head_commit.message }}"
    
    - name: ❌ Notificación de error
      if: failure()
      run: |
        echo "❌ Error en el deployment"
        echo "Por favor revisa los logs arriba"

  # RESUMEN: Solo para información
  pipeline-summary:
    name: 📋 Resumen del Pipeline
    runs-on: ubuntu-latest
    needs: [build, quality, docker-build, deploy]
    if: always()
    
    steps:
    - name: 📊 Estado del Pipeline
      run: |
        echo "================================================"
        echo "📋 Resumen del Pipeline CI/CD - BraJos Soft"
        echo "================================================"
        echo ""
        echo "🏗️  Build & Test:    ${{ needs.build.result }}"
        echo "📊 Code Quality:    ${{ needs.quality.result }}"
        echo "🐳 Docker Build:    ${{ needs.docker-build.result }}"
        echo "🚀 Deploy:          ${{ needs.deploy.result }}"
        echo ""
        echo "📦 Commit:          ${{ github.sha }}"
        echo "🌿 Branch:          ${{ github.ref_name }}"
        echo "👤 Usuario:         ${{ github.actor }}"
        echo "================================================"
        
        if [[ "${{ needs.build.result }}" == "success" ]] && \
           [[ "${{ needs.quality.result }}" == "success" ]] && \
           [[ "${{ needs.docker-build.result }}" == "success" ]] && \
           [[ "${{ needs.deploy.result }}" == "success" || "${{ needs.deploy.result }}" == "skipped" ]]; then
          echo ""
          echo "✅ Pipeline completado exitosamente"
          echo "🌐 Sitio web desplegado en puerto 3001"
          exit 0
        else
          echo ""
          echo "❌ Hubo errores en el pipeline"
          exit 1
        fi
