version: '3.8'

services:
  brajos-soft:
    image: brajossoft:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brajos-soft-web
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped

networks:
  default:
    driver: bridge
