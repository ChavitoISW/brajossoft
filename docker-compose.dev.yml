version: '3.8'

services:
  brajos-soft-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: brajos-soft-dev
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - PORT=3001
    command: npm run dev
    restart: unless-stopped

networks:
  default:
    driver: bridge
